global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
  
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:3001']
  
  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:3002']
  
  - job_name: 'people-service'
    static_configs:
      - targets: ['people-service:3003']
  
  - job_name: 'work-service'
    static_configs:
      - targets: ['work-service:3004']
  
  - job_name: 'money-service'
    static_configs:
      - targets: ['money-service:3005']
  
  - job_name: 'assets-service'
    static_configs:
      - targets: ['assets-service:3006']
  
  - job_name: 'support-service'
    static_configs:
      - targets: ['support-service:3007']
  
  - job_name: 'growth-service'
    static_configs:
      - targets: ['growth-service:3008']
