# TeamOne Kubernetes Production Configuration

# ═══════════════════════════════════════════════════════════════════
# Namespace
# ═══════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Namespace
metadata:
  name: teamone-production
  labels:
    name: teamone-production
    environment: production

---
# ═══════════════════════════════════════════════════════════════════
# ConfigMap - Application Configuration
# ═══════════════════════════════════════════════════════════════════
apiVersion: v1
kind: ConfigMap
metadata:
  name: teamone-config
  namespace: teamone-production
data:
  NODE_ENV: "production"
  LOG_LEVEL: "warn"
  CORS_ORIGIN: "https://teamone.local"
  RATE_LIMIT_WINDOW_MS: "60000"
  RATE_LIMIT_MAX_REQUESTS: "100"
  JWT_EXPIRY: "15m"
  REFRESH_TOKEN_EXPIRY: "7d"
  MFA_ENABLED: "true"
  PASSWORD_MIN_LENGTH: "12"
  ACCOUNT_LOCKOUT_THRESHOLD: "5"
  ACCOUNT_LOCKOUT_DURATION: "900"

---
# ═══════════════════════════════════════════════════════════════════
# Secrets
# ═══════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Secret
metadata:
  name: teamone-secrets
  namespace: teamone-production
type: Opaque
stringData:
  db-password: ${DB_PASSWORD}
  redis-password: ${REDIS_PASSWORD}
  jwt-secret: ${JWT_SECRET}
  refresh-token-secret: ${REFRESH_TOKEN_SECRET}
  encryption-key: ${ENCRYPTION_KEY}
  google-oauth-secret: ${GOOGLE_OAUTH_SECRET}
  kafka-username: ${KAFKA_USERNAME}
  kafka-password: ${KAFKA_PASSWORD}
  smtp-password: ${SMTP_PASSWORD}
  elastic-password: ${ELASTIC_PASSWORD}
  minio-root-password: ${MINIO_ROOT_PASSWORD}

---
# ═══════════════════════════════════════════════════════════════════
# PostgreSQL StatefulSet
# ═══════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: teamone-production
spec:
  serviceName: postgres
  replicas: 3
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              value: "teamone"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: teamone-secrets
                  key: db-password
            - name: POSTGRES_DB
              value: "teamone"
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-config
              mountPath: /etc/postgresql/postgresql.conf
              subPath: postgresql.conf
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - teamone
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - teamone
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 6
      volumes:
        - name: postgres-config
          configMap:
            name: postgres-config
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: "fast-ssd"
        resources:
          requests:
            storage: 100Gi

---
# ═══════════════════════════════════════════════════════════════════
# PostgreSQL Service
# ═══════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: teamone-production
  labels:
    app: postgres
spec:
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  clusterIP: None
  selector:
    app: postgres

---
# ═══════════════════════════════════════════════════════════════════
# Redis StatefulSet
# ═══════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: teamone-production
spec:
  serviceName: redis
  replicas: 3
  selector:
    matchLabels:
    app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - --requirepass
            - $(REDIS_PASSWORD)
            - --appendonly
            - "yes"
            - --maxmemory
            - "2gb"
            - --maxmemory-policy
            - "allkeys-lru"
          ports:
            - containerPort: 6379
              name: redis
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: teamone-secrets
                  key: redis-password
          volumeMounts:
            - name: redis-data
              mountPath: /data
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          livenessProbe:
            exec:
              command:
                - redis-cli
                - -a
                - $(REDIS_PASSWORD)
                - ping
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - redis-cli
                - -a
                - $(REDIS_PASSWORD)
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: "fast-ssd"
        resources:
          requests:
            storage: 20Gi

---
# ═══════════════════════════════════════════════════════════════════
# Redis Service
# ═══════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: teamone-production
spec:
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  clusterIP: None
  selector:
    app: redis

---
# ═══════════════════════════════════════════════════════════════════
# API Gateway Deployment
# ═══════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: teamone-production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/trustybytes/teamone-api-gateway:latest
          ports:
            - containerPort: 3001
              name: http
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: teamone-config
                  key: NODE_ENV
            - name: PORT
              value: "3001"
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:3002"
            - name: WORK_SERVICE_URL
              value: "http://work-service:3004"
            - name: MONEY_SERVICE_URL
              value: "http://money-service:3005"
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@redis:6379"
          envFrom:
            - secretRef:
                name: teamone-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "30"]
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: api-gateway
                topologyKey: kubernetes.io/hostname

---
# ═══════════════════════════════════════════════════════════════════
# API Gateway Service
# ═══════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: teamone-production
spec:
  selector:
    app: api-gateway
  ports:
    - port: 3001
      targetPort: 3001
      name: http
  type: ClusterIP

---
# ═══════════════════════════════════════════════════════════════════
# Auth Service Deployment
# ═══════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: teamone-production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: ghcr.io/trustybytes/teamone-auth:latest
          ports:
            - containerPort: 3002
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: teamone-config
                  key: NODE_ENV
            - name: PORT
              value: "3002"
            - name: DATABASE_URL
              value: "postgresql://teamone:$(DB_PASSWORD)@postgres:5432/teamone_auth"
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@redis:6379"
          envFrom:
            - secretRef:
                name: teamone-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 5

---
# ═══════════════════════════════════════════════════════════════════
# Auth Service Service
# ═══════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: teamone-production
spec:
  selector:
    app: auth-service
  ports:
    - port: 3002
      targetPort: 3002
  type: ClusterIP

---
# ═══════════════════════════════════════════════════════════════════
# Work Service Deployment
# ═══════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: work-service
  namespace: teamone-production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: work-service
  template:
    metadata:
      labels:
        app: work-service
    spec:
      containers:
        - name: work-service
          image: ghcr.io/trustybytes/teamone-work:latest
          ports:
            - containerPort: 3004
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: teamone-config
                  key: NODE_ENV
            - name: PORT
              value: "3004"
            - name: DATABASE_URL
              value: "postgresql://teamone:$(DB_PASSWORD)@postgres:5432/teamone_work"
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@redis:6379"
            - name: KAFKA_BROKERS
              value: "kafka:9092"
          envFrom:
            - secretRef:
                name: teamone-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 5
            periodSeconds: 5

---
# ═══════════════════════════════════════════════════════════════════
# Work Service Service
# ═══════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Service
metadata:
  name: work-service
  namespace: teamone-production
spec:
  selector:
    app: work-service
  ports:
    - port: 3004
      targetPort: 3004
  type: ClusterIP

---
# ═══════════════════════════════════════════════════════════════════
# Ingress
# ═══════════════════════════════════════════════════════════════════
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: teamone-ingress
  namespace: teamone-production
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  tls:
    - hosts:
        - teamone.local
        - api.teamone.local
      secretName: teamone-tls
  rules:
    - host: teamone.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
    - host: api.teamone.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3001

---
# ═══════════════════════════════════════════════════════════════════
# Horizontal Pod Autoscaler - API Gateway
# ═══════════════════════════════════════════════════════════════════
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: teamone-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max

---
# ═══════════════════════════════════════════════════════════════════
# Network Policy
# ═══════════════════════════════════════════════════════════════════
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: teamone-network-policy
  namespace: teamone-production
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
    - from:
        - podSelector: {}
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 9092

---
# ═══════════════════════════════════════════════════════════════════
# Pod Disruption Budget
# ═══════════════════════════════════════════════════════════════════
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-gateway-pdb
  namespace: teamone-production
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: api-gateway

---
# ═══════════════════════════════════════════════════════════════════
# Prometheus Monitoring
# ═══════════════════════════════════════════════════════════════════
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: teamone-monitor
  namespace: teamone-production
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: api-gateway
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
  namespaceSelector:
    matchNames:
      - teamone-production

---
# ═══════════════════════════════════════════════════════════════════
# Persistent Volume Claims
# ═══════════════════════════════════════════════════════════════════
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: teamone-production
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: fast-ssd
  resources:
    requests:
      storage: 100Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: teamone-production
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: fast-ssd
  resources:
    requests:
      storage: 20Gi
