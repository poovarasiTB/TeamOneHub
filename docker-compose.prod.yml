# TeamOne Production Docker Compose

# ═══════════════════════════════════════════════════════════════════
# PRODUCTION CONFIGURATION
# ═══════════════════════════════════════════════════════════════════
# 
# This configuration is optimized for production deployment with:
# - High availability
# - Security hardening
# - Performance optimization
# - Monitoring & logging
# - Backup & recovery
#
# Usage:
#   docker-compose -f docker-compose.prod.yml up -d
#
# ═══════════════════════════════════════════════════════════════════

services:
  # ─────────────────────────────────────────────────────────────────
  # Reverse Proxy & SSL (Traefik)
  # ─────────────────────────────────────────────────────────────────
  traefik:
    image: traefik:v3.0
    container_name: teamone-traefik
    command:
      - "--api.insecure=false"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=teamone-network"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--accesslog=true"
      - "--accesslog.filepath=/var/log/traefik/access.log"
      - "--accesslog.format=json"
      - "--log.level=INFO"
      - "--log.format=json"
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.buckets=0.1,0.3,1.2,5.0"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/letsencrypt
      - traefik-logs:/var/log/traefik
    networks:
      - teamone-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=auth"
      - "traefik.http.middlewares.auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH}"
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ─────────────────────────────────────────────────────────────────
  # API Gateway
  # ─────────────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: teamone-api-gateway
    environment:
      - NODE_ENV=production
      - PORT=3001
      - LOG_LEVEL=warn
      - AUTH_SERVICE_URL=http://auth-service:3002
      - PEOPLE_SERVICE_URL=http://people-service:3003
      - WORK_SERVICE_URL=http://work-service:3004
      - MONEY_SERVICE_URL=http://money-service:3005
      - ASSETS_SERVICE_URL=http://assets-service:3006
      - SUPPORT_SERVICE_URL=http://support-service:3007
      - GROWTH_SERVICE_URL=http://growth-service:3008
      - REDIS_URL=redis://redis:6379
      - RATE_LIMIT_WINDOW_MS=60000
      - RATE_LIMIT_MAX_REQUESTS=100
      - CORS_ORIGIN=https://${DOMAIN}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - teamone-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.${DOMAIN}`)"
      - "traefik.http.routers.api.tls=true"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=3001"
      - "traefik.http.routers.api.middlewares=ratelimit,security-headers"
      - "traefik.http.middlewares.ratelimit.ratelimit.average=100"
      - "traefik.http.middlewares.ratelimit.ratelimit.burst=200"
      - "traefik.http.middlewares.security-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.security-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.security-headers.headers.browserXssFilter=true"
    restart: always
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      healthcheck:
        test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
        interval: 30s
        timeout: 10s
        retries: 3
        start_period: 40s

  # ─────────────────────────────────────────────────────────────────
  # Auth Service
  # ─────────────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ./backend/services/auth
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: teamone-auth
    environment:
      - NODE_ENV=production
      - PORT=3002
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/teamone_auth?sslmode=require
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - JWT_SECRET_FILE=/run/secrets/jwt_secret
      - JWT_EXPIRY=15m
      - REFRESH_TOKEN_SECRET_FILE=/run/secrets/refresh_token_secret
      - REFRESH_TOKEN_EXPIRY=7d
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}
      - GOOGLE_OAUTH_CLIENT_SECRET_FILE=/run/secrets/google_oauth_secret
      - MFA_ENABLED=true
      - PASSWORD_MIN_LENGTH=12
      - PASSWORD_REQUIRE_UPPERCASE=true
      - PASSWORD_REQUIRE_LOWERCASE=true
      - PASSWORD_REQUIRE_NUMBERS=true
      - PASSWORD_REQUIRE_SPECIAL=true
      - ACCOUNT_LOCKOUT_THRESHOLD=5
      - ACCOUNT_LOCKOUT_DURATION=900
    secrets:
      - jwt_secret
      - refresh_token_secret
      - google_oauth_secret
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - teamone-network
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─────────────────────────────────────────────────────────────────
  # Work Service
  # ─────────────────────────────────────────────────────────────────
  work-service:
    build:
      context: ./backend/services/work
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: teamone-work
    environment:
      - NODE_ENV=production
      - PORT=3004
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/teamone_work?sslmode=require
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_SSL_ENABLED=true
      - KAFKA_USERNAME_FILE=/run/secrets/kafka_username
      - KAFKA_PASSWORD_FILE=/run/secrets/kafka_password
    secrets:
      - kafka_username
      - kafka_password
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - teamone-network
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─────────────────────────────────────────────────────────────────
  # Money Service
  # ─────────────────────────────────────────────────────────────────
  money-service:
    build:
      context: ./backend/services/money
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: teamone-money
    environment:
      - NODE_ENV=production
      - PORT=3005
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/teamone_money?sslmode=require
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - ENCRYPTION_KEY_FILE=/run/secrets/encryption_key
      - PCI_DSS_MODE=true
    secrets:
      - encryption_key
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - teamone-network
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─────────────────────────────────────────────────────────────────
  # Assets Service
  # ─────────────────────────────────────────────────────────────────
  assets-service:
    build:
      context: ./backend/services/assets
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: teamone-assets
    environment:
      - NODE_ENV=production
      - PORT=3006
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/teamone_assets?sslmode=require
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - teamone-network
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─────────────────────────────────────────────────────────────────
  # Support Service
  # ─────────────────────────────────────────────────────────────────
  support-service:
    build:
      context: ./backend/services/support
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: teamone-support
    environment:
      - NODE_ENV=production
      - PORT=3007
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/teamone_support?sslmode=require
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER_FILE=/run/secrets/smtp_user
      - SMTP_PASSWORD_FILE=/run/secrets/smtp_password
      - FROM_EMAIL=${FROM_EMAIL}
    secrets:
      - smtp_user
      - smtp_password
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - teamone-network
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3007/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─────────────────────────────────────────────────────────────────
  # Growth Service
  # ─────────────────────────────────────────────────────────────────
  growth-service:
    build:
      context: ./backend/services/growth
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: teamone-growth
    environment:
      - NODE_ENV=production
      - PORT=3008
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/teamone_growth?sslmode=require
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - teamone-network
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3008/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─────────────────────────────────────────────────────────────────
  # Frontend PWA
  # ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
        - VITE_API_URL=https://api.${DOMAIN}
        - VITE_WS_URL=wss://api.${DOMAIN}
    container_name: teamone-frontend
    networks:
      - teamone-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
      - "traefik.http.routers.frontend.middlewares=security-headers"
    restart: always
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ─────────────────────────────────────────────────────────────────
  # PostgreSQL (Primary Database)
  # ─────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: teamone-postgres
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD_FILE=/run/secrets/db_password
      - POSTGRES_DB=teamone
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init-scripts:/docker-entrypoint-initdb.d:ro
      - ./database/backups:/backups
    secrets:
      - db_password
    networks:
      - teamone-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d teamone"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      postgres
      -c shared_preload_libraries=pgaudit
      -c pgaudit.log=all,REGEX
      -c pgaudit.log_catalog=off
      -c log_statement=all
      -c log_duration=on
      -c log_min_duration_statement=1000
      -c log_checkpoints=on
      -c log_connections=on
      -c log_disconnections=on
      -c log_lock_waits=on
      -c log_temp_files=0
      -c log_timezone=on
      -c timezone=UTC
      -c shared_buffers=2GB
      -c effective_cache_size=6GB
      -c maintenance_work_mem=512MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=10MB
      -c min_wal_size=1GB
      -c max_wal_size=4GB
      -c max_connections=200
      -c ssl=on
      -c ssl_cert_file=/etc/ssl/certs/ssl-cert-snakeoil.pem
      -c ssl_key_file=/etc/ssl/private/ssl-cert-snakeoil.key

  # ─────────────────────────────────────────────────────────────────
  # Redis (Cache & Sessions)
  # ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: teamone-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 300
      --timeout 0
    volumes:
      - redis-data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    secrets:
      - redis_password
    networks:
      - teamone-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─────────────────────────────────────────────────────────────────
  # Apache Kafka (Event Streaming)
  # ─────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: teamone-kafka
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=3
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=2
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=3
      - KAFKA_LOG_RETENTION_MS=604800000
      - KAFKA_LOG_RETENTION_BYTES=107374182400
      - KAFKA_NUM_PARTITIONS=6
      - KAFKA_DEFAULT_REPLICATION_FACTOR=3
      - KAFKA_MIN_INSYNC_REPLICAS=2
      - KAFKA_COMPRESSION_TYPE=lz4
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=false
    depends_on:
      - zookeeper
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - teamone-network
    restart: always
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: teamone-zookeeper
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
      - ZOOKEEPER_INIT_LIMIT=5
      - ZOOKEEPER_SYNC_LIMIT=2
      - ZOOKEEPER_MAX_CLIENT_CNXNS=60
      - ZOOKEEPER_AUTOPURGE_SNAP_RETAIN_COUNT=3
      - ZOOKEEPER_AUTOPURGE_PURGE_INTERVAL=24
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    networks:
      - teamone-network
    restart: always
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  # ─────────────────────────────────────────────────────────────────
  # Elasticsearch (Search & Analytics)
  # ─────────────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: teamone-es
    environment:
      - node.name=es-node-1
      - cluster.name=teamone-cluster
      - cluster.initial_master_nodes=es-node-1,es-node-2,es-node-3
      - discovery.seed_hosts=es-node-2,es-node-3
      - bootstrap.memory_lock=true
      - xpack.security.enabled=true
      - xpack.security.enrollment.enabled=false
      - xpack.security.http.ssl.enabled=true
      - xpack.security.http.ssl.key=certs/es-node-1.key
      - xpack.security.http.ssl.certificate=certs/es-node-1.crt
      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.key=certs/es-node-1.key
      - xpack.security.transport.ssl.certificate=certs/es-node-1.crt
      - xpack.security.transport.ssl.certificate_authorities=certs/ca.crt
      - xpack.security.transport.ssl.verification_mode=certificate
      - ELASTIC_PASSWORD_FILE=/run/secrets/elastic_password
      - "ES_JAVA_OPTS=-Xms2g -Xmx2g"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
      - elasticsearch-certs:/usr/share/elasticsearch/config/certs:ro
    secrets:
      - elastic_password
    networks:
      - teamone-network
    restart: always
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "curl -f -k https://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ─────────────────────────────────────────────────────────────────
  # MinIO (S3-Compatible Object Storage)
  # ─────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: teamone-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER_FILE=/run/secrets/minio_user
      - MINIO_ROOT_PASSWORD_FILE=/run/secrets/minio_password
      - MINIO_BROWSER_REDIRECT_URL=https://minio.${DOMAIN}
    volumes:
      - minio-data:/data
      - minio-config:/root/.minio
    secrets:
      - minio_user
      - minio_password
    networks:
      - teamone-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minio.rule=Host(`minio.${DOMAIN}`)"
      - "traefik.http.routers.minio.tls=true"
      - "traefik.http.routers.minio.tls.certresolver=letsencrypt"
      - "traefik.http.services.minio.loadbalancer.server.port=9000"
    restart: always
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─────────────────────────────────────────────────────────────────
  # Prometheus (Metrics Collection)
  # ─────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: teamone-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts:/etc/prometheus/alerts:ro
      - prometheus-data:/prometheus
      - prometheus-rules:/etc/prometheus/rules
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=90d'
      - '--storage.tsdb.retention.size=50GB'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
      - '--web.external-url=https://prometheus.${DOMAIN}'
      - '--web.route-prefix=/'
    networks:
      - teamone-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=Host(`prometheus.${DOMAIN}`)"
      - "traefik.http.routers.prometheus.tls=true"
      - "traefik.http.routers.prometheus.tls.certresolver=letsencrypt"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
    restart: always
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─────────────────────────────────────────────────────────────────
  # Grafana (Metrics Dashboard)
  # ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.0
    container_name: teamone-grafana
    environment:
      - GF_SECURITY_ADMIN_USER_FILE=/run/secrets/grafana_admin_user
      - GF_SECURITY_ADMIN_PASSWORD_FILE=/run/secrets/grafana_admin_password
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://grafana.${DOMAIN}
      - GF_AUTH_GENERIC_OAUTH_ENABLED=true
      - GF_AUTH_GENERIC_OAUTH_NAME=TeamOne SSO
      - GF_AUTH_GENERIC_OAUTH_CLIENT_ID=${GRAFANA_OAUTH_CLIENT_ID}
      - GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET_FILE=/run/secrets/grafana_oauth_secret
      - GF_AUTH_GENERIC_OAUTH_SCOPES=user:email
      - GF_AUTH_GENERIC_OAUTH_AUTH_URL=https://auth.${DOMAIN}/oauth/authorize
      - GF_AUTH_GENERIC_OAUTH_TOKEN_URL=https://auth.${DOMAIN}/oauth/token
      - GF_AUTH_GENERIC_OAUTH_API_URL=https://auth.${DOMAIN}/api/userinfo
      - GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-worldmap-panel
      - GF_ALERTING_ENABLED=true
      - GF_UNIFIED_ALERTING_ENABLED=true
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=${SMTP_HOST}:${SMTP_PORT}
      - GF_SMTP_USER_FILE=/run/secrets/smtp_user
      - GF_SMTP_PASSWORD_FILE=/run/secrets/smtp_password
      - GF_SMTP_FROM_ADDRESS=${FROM_EMAIL}
    secrets:
      - grafana_admin_user
      - grafana_admin_password
      - grafana_oauth_secret
      - smtp_user
      - smtp_password
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - teamone-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.${DOMAIN}`)"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
      - "traefik.http.services.grafana.loadbalancer.server.port=3100"
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─────────────────────────────────────────────────────────────────
  # Logstash (Log Processing)
  # ─────────────────────────────────────────────────────────────────
  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.0
    container_name: teamone-logstash
    volumes:
      - ./monitoring/logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./monitoring/logstash/config:/usr/share/logstash/config:ro
      - logstash-data:/usr/share/logstash/data
    networks:
      - teamone-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9600/_node/stats || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ─────────────────────────────────────────────────────────────────
  # Kibana (Log Visualization)
  # ─────────────────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: teamone-kibana
    environment:
      - ELASTICSEARCH_HOSTS=https://elasticsearch:9200
      - ELASTICSEARCH_SSL_CERTIFICATEAUTHORITIES=/usr/share/kibana/config/certs/ca.crt
      - KIBANA_SYSTEM_PASSWORD_FILE=/run/secrets/kibana_password
      - SERVER_NAME=kibana
      - SERVER_HOST=0.0.0.0
      - SERVER_PUBLICBASEURL=https://kibana.${DOMAIN}
      - ELASTICSEARCH_SERVICEACCOUNTTOKEN_FILE=/run/secrets/elastic_service_token
      - XPACK_SECURITY_ENABLED=true
      - XPACK_SECURITY_ENROLLMENT_ENABLED=false
      - XPACK_SECURITY_HTTP_SSL_ENABLED=true
      - XPACK_SECURITY_HTTP_SSL_CERTIFICATE=/usr/share/kibana/config/certs/kibana.crt
      - XPACK_SECURITY_HTTP_SSL_KEY=/usr/share/kibana/config/certs/kibana.key
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY_FILE=/run/secrets/kibana_encryption_key
      - XPACK_FLEET_ISAIRGAPPED=true
      - XPACK_REPORTING_ENABLED=true
      - XPACK_REPORTING_KIBANA_SERVER_PUBLICBASEURL=https://kibana.${DOMAIN}
    secrets:
      - kibana_password
      - elastic_service_token
      - kibana_encryption_key
    volumes:
      - kibana-data:/usr/share/kibana/data
      - ./monitoring/kibana/config:/usr/share/kibana/config:ro
    networks:
      - teamone-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kibana.rule=Host(`kibana.${DOMAIN}`)"
      - "traefik.http.routers.kibana.tls=true"
      - "traefik.http.routers.kibana.tls.certresolver=letsencrypt"
      - "traefik.http.services.kibana.loadbalancer.server.port=5601"
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    depends_on:
      - elasticsearch
    healthcheck:
      test: ["CMD-SHELL", "curl -f -k https://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ─────────────────────────────────────────────────────────────────
  # Backup Service (PostgreSQL)
  # ─────────────────────────────────────────────────────────────────
  backup:
    image: prodrigestivill/postgres-backup-local:16
    container_name: teamone-backup
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=teamone
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD_FILE=/run/secrets/db_password
      - SCHEDULE=@daily
      - BACKUP_KEEP_DAYS=30
      - BACKUP_KEEP_WEEKS=8
      - BACKUP_KEEP_MONTHS=12
      - HEALTHCHECK_PATH=/health
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_ACCESS_KEY_ID_FILE=/run/secrets/s3_access_key
      - S3_SECRET_ACCESS_KEY_FILE=/run/secrets/s3_secret_key
    secrets:
      - db_password
      - s3_access_key
      - s3_secret_key
    volumes:
      - ./database/backups:/backups
    networks:
      - teamone-network
    restart: always
    depends_on:
      postgres:
        condition: service_healthy

  # ─────────────────────────────────────────────────────────────────
  # Watchtower (Auto Updates)
  # ─────────────────────────────────────────────────────────────────
  watchtower:
    image: containrrr/watchtower:latest
    container_name: teamone-watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: --schedule "0 0 4 * * *" --cleanup --label-enable --health-check
    networks:
      - teamone-network
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    environment:
      - WATCHTOWER_NOTIFICATIONS=shoutrrr
      - WATCHTOWER_NOTIFICATION_URL=shoutrrr://grafana.${DOMAIN}/

# ═══════════════════════════════════════════════════════════════════
# Networks
# ═══════════════════════════════════════════════════════════════════
networks:
  teamone-network:
    driver: overlay
    attachable: true
    ipam:
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1

# ═══════════════════════════════════════════════════════════════════
# Volumes
# ═══════════════════════════════════════════════════════════════════
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  kafka-data:
    driver: local
  zookeeper-data:
    driver: local
  zookeeper-logs:
    driver: local
  elasticsearch-data:
    driver: local
  elasticsearch-certs:
    driver: local
  minio-data:
    driver: local
  minio-config:
    driver: local
  grafana-data:
    driver: local
  prometheus-data:
    driver: local
  prometheus-rules:
    driver: local
  kibana-data:
    driver: local
  logstash-data:
    driver: local
  traefik-certs:
    driver: local
  traefik-logs:
    driver: local

# ═══════════════════════════════════════════════════════════════════
# Secrets
# ═══════════════════════════════════════════════════════════════════
secrets:
  db_password:
    external: true
  redis_password:
    external: true
  jwt_secret:
    external: true
  refresh_token_secret:
    external: true
  encryption_key:
    external: true
  google_oauth_secret:
    external: true
  kafka_username:
    external: true
  kafka_password:
    external: true
  smtp_user:
    external: true
  smtp_password:
    external: true
  elastic_password:
    external: true
  minio_user:
    external: true
  minio_password:
    external: true
  grafana_admin_user:
    external: true
  grafana_admin_password:
    external: true
  grafana_oauth_secret:
    external: true
  kibana_password:
    external: true
  elastic_service_token:
    external: true
  kibana_encryption_key:
    external: true
  s3_access_key:
    external: true
  s3_secret_key:
    external: true
